; Quieter cold GNSS-SDR file replay for the 50 MHz IQ16 Galileo E1B capture.
; Same timing fix as file_gal_e1b_iq16_50mhz_ppp_static_under30.conf, but
; only 10 known-useful Galileo PRNs are assigned to channels. This avoids
; dozens of spare channels repeatedly acquiring weak candidates and losing lock.

[GNSS-SDR]
GNSS-SDR.internal_fs_sps=5000000
ControlThread.wait_for_flowgraph=false
GNSS-SDR.tow_to_trk=true
GNSS-SDR.osnma_enable=false

PVT.enable_monitor=false
Monitor.enable_monitor=false
TrackingMonitor.enable_monitor=false

SignalSource.implementation=File_Signal_Source
SignalSource.filename=/media/qvise/9AE4047CE4045D3F/raza/max_satellites_L1band_88ch_50MHz_1584MHz_IQ16.bin
SignalSource.item_type=ishort
SignalSource.sampling_frequency=50000000
SignalSource.seconds_to_skip=8.5
SignalSource.samples=0
SignalSource.repeat=false
SignalSource.dump=false
SignalSource.enable_throttle_control=false

SignalConditioner.implementation=Signal_Conditioner
DataTypeAdapter.implementation=Ishort_To_Complex

InputFilter.implementation=Freq_Xlating_Fir_Filter
InputFilter.input_item_type=gr_complex
InputFilter.output_item_type=gr_complex
InputFilter.taps_item_type=float
InputFilter.filter_type=lowpass
InputFilter.sampling_frequency=50000000
InputFilter.IF=-8580000
InputFilter.decimation_factor=10
InputFilter.bw=2300000
InputFilter.tw=500000
InputFilter.dump=false

Resampler.implementation=Pass_Through
Resampler.item_type=gr_complex

Channels_1C.count=0
Channels_1B.count=10
Channels.in_acquisition=10
Channel.signal=1B
Channel0.signal=1B
Channel0.satellite=1
Channel1.signal=1B
Channel1.satellite=4
Channel2.signal=1B
Channel2.satellite=5
Channel3.signal=1B
Channel3.satellite=9
Channel4.signal=1B
Channel4.satellite=13
Channel5.signal=1B
Channel5.satellite=21
Channel6.signal=1B
Channel6.satellite=24
Channel7.signal=1B
Channel7.satellite=26
Channel8.signal=1B
Channel8.satellite=31
Channel9.signal=1B
Channel9.satellite=33

Acquisition_1B.implementation=Galileo_E1_PCPS_Ambiguous_Acquisition
Acquisition_1B.item_type=gr_complex
Acquisition_1B.coherent_integration_time_ms=4
Acquisition_1B.pfa=0.01
Acquisition_1B.doppler_max=5000
Acquisition_1B.doppler_step=125
Acquisition_1B.dump=false
Acquisition_1B.dump_filename=./outputs/acquisition/acq_dump.dat

Tracking_1B.implementation=Galileo_E1_DLL_PLL_VEML_Tracking
Tracking_1B.item_type=gr_complex
Tracking_1B.pll_bw_hz=35.0
Tracking_1B.dll_bw_hz=2.0
Tracking_1B.pll_filter_order=3
Tracking_1B.dll_filter_order=2
Tracking_1B.early_late_space_chips=0.25
Tracking_1B.very_early_late_space_chips=0.5
Tracking_1B.extend_correlation_symbols=1
Tracking_1B.enable_fll_pull_in=true
Tracking_1B.enable_fll_steady_state=false
Tracking_1B.fll_bw_hz=35.0
Tracking_1B.pull_in_time_s=0
Tracking_1B.bit_synchronization_time_limit_s=20
Tracking_1B.cn0_min=25
Tracking_1B.dump=false
Tracking_1B.dump_mat=false
Tracking_1B.dump_filename=./outputs/tracking/tracking_ch_

TelemetryDecoder_1B.implementation=Galileo_E1B_Telemetry_Decoder
TelemetryDecoder_1B.use_reduced_ced=true
TelemetryDecoder_1B.enable_reed_solomon=true
TelemetryDecoder_1B.dump=false
TelemetryDecoder_1B.dump_filename=./outputs/telemetry/telemetry_decoder_1B.dat

Observables.implementation=Hybrid_Observables
Observables.dump=false
Observables.dump_filename=./outputs/observables/observables.dat

PVT.implementation=RTKLIB_PVT
PVT.positioning_mode=PPP_Static
PVT.output_rate_ms=100
PVT.display_rate_ms=500
PVT.iono_model=Broadcast
PVT.trop_model=Saastamoinen
PVT.output_path=./outputs/pvt
PVT.rinex_output_path=./outputs/pvt
PVT.gpx_output_path=./outputs/pvt
PVT.geojson_output_path=./outputs/pvt
PVT.kml_output_path=./outputs/pvt
PVT.xml_output_path=./outputs/pvt
PVT.nmea_output_file_path=./outputs/pvt
PVT.nmea_output_file_enabled=false
PVT.flag_nmea_tty_port=false
PVT.flag_rtcm_server=false
PVT.flag_rtcm_tty_port=false
PVT.dump=false
PVT.dump_filename=pvt
PVT.nmea_dump_filename=gnss_sdr_pvt.nmea
